name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
      
      - name: نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: نصب وابستگی‌ها
        run: |
          npm install
          npm install -g eas-cli
      
      - name: ساخت APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p android --profile preview --non-interactive
      
      - name: دریافت آخرین ساخت موفق
        id: get-build
        run: |
          BUILD_JSON=$(eas build:list -p android --limit 1 --json --non-interactive)
          echo "$BUILD_JSON"
          BUILD_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
      
      - name: دانلود APK
        run: |
          if [ -n "${{ steps.get-build.outputs.build_url }}" ]; then
            curl -L ${{ steps.get-build.outputs.build_url }} -o app.apk
          else
            echo "هیچ لینکی پیدا نشد"
            exit 1
          fi
      
      - name: بارگذاری APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app.apk
