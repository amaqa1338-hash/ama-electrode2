name: Build Android APK (Manual Download)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
      
      - name: نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: نصب وابستگی‌ها
        run: |
          npm install
          npm install -g eas-cli
      
      - name: ساخت APK با EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "شروع ساخت ابری APK..."
          eas build -p android --profile preview --non-interactive
      
      - name: اطلاع از اتمام ساخت
        run: |
          echo "✅ ساخت با موفقیت انجام شد."
          echo "برای دانلود APK، به داشبورد Expo بروید:"
          echo "https://expo.dev/accounts/amaqa1338-hash/projects/ama-electrode2/builds"
