name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
      
      - name: نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: نصب وابستگی‌ها
        run: |
          npm install
          npm install -g eas-cli
      
      - name: ساخت APK با EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "شروع ساخت APK..."
          eas build -p android --profile preview --non-interactive --output ./app.apk
      
      - name: بارگذاری APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app.apk
